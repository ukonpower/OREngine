<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>OREngine - Basic</title>
</head>

<style>

	* {
		padding: 0;
		margin: 0;
		box-sizing: border-box;
	}
	
	body {
		width: 100%;
		height: 100%;
		overflow: hidden;
	}
	
	#canvas {
		width: 100%;
		height: 100%;
	}
	
</style>

<body>
	
	<canvas id="canvas"></canvas>
	
	<script type="module">

		import * as OREngine from '../build/orengine.module.js';

		let renderer = new OREngine.Renderer( {
			canvas: document.querySelector( "#canvas" )
		} );

		render();
		
		let a = new OREngine.Matrix4().set( 
			[
				2, 11, 23, 41,
				3, 13, 29, 43,
				5, 17, 31, 47,
				7, 19, 37, 53,
			] );

		let b = new OREngine.Matrix4().set( 
			[
				59, 73, 97, 109,
				61, 79, 101, 113,
				67, 83, 103, 127,
				71, 89, 107, 131
			] );
		
		a.multiply( b );

		console.log( a );
		
		function render() {

			requestAnimationFrame( render );
			
		}
		
	</script>

</body>
</html>
